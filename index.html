<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSLO - Invoice Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .invoice-container {
            font-family: 'Inter', sans-serif;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 50px;
            background: white;
            width: 210mm;
            min-height: 297mm;
        }
        
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md border-b border-gray-200 no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <img src="logo.png" alt="MSLO Logo" class="h-10 w-auto mr-3" onerror="this.style.display='none'">
                    <h1 class="text-2xl font-bold text-gray-800">MSLO Invoice System</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                        <i class="fas fa-plus-circle mr-2"></i>Generator
                    </a>
                    <a href="history.html" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
                        <i class="fas fa-history mr-2"></i>History
                    </a>
                    <a href="manage.html" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                        <i class="fas fa-cog mr-2"></i>Manage
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Panel - Form -->
            <div class="lg:col-span-1 space-y-6 no-print">
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">Client Information</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Select Client *</label>
                            <select id="clientSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <option value="">-- Select Client --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ship To Address</label>
                            <textarea id="shipTo" rows="3" placeholder="Enter shipping address" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">Invoice Details</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Invoice Number</label>
                            <input type="text" id="invoiceNumber" readonly 
                                class="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Invoice Date *</label>
                            <input type="date" id="invoiceDate" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Payment Due Date *</label>
                            <input type="date" id="dueDate" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6">
                    <div class="space-y-3">
                        <button onclick="previewInvoice()" 
                            class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                            <i class="fas fa-eye mr-2"></i>Preview Invoice
                        </button>
                        <button onclick="saveInvoice()" 
                            class="w-full px-4 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-medium">
                            <i class="fas fa-save mr-2"></i>Save Invoice
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Line Items -->
            <div class="lg:col-span-2 no-print">
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold text-gray-800">Invoice Items</h2>
                        <button onclick="addLineItem()" 
                            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm">
                            <i class="fas fa-plus mr-2"></i>Add Item
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Item</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase w-24">Qty</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase w-32">Price (R)</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase w-32">Total</th>
                                    <th class="px-4 py-3 w-10"></th>
                                </tr>
                            </thead>
                            <tbody id="invoiceItems" class="divide-y divide-gray-200">
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-6 border-t border-gray-200 pt-4">
                        <div class="flex justify-end">
                            <div class="text-right">
                                <p class="text-sm text-gray-600 mb-1">Subtotal</p>
                                <p class="text-2xl font-bold text-gray-900" id="grandTotal">R0.00</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 overflow-auto">
        <div class="min-h-screen px-4 py-8">
            <div class="bg-white rounded-lg shadow-2xl max-w-5xl mx-auto">
                <div class="bg-gray-800 text-white px-6 py-4 flex justify-between items-center no-print">
                    <h3 class="text-lg font-semibold">Invoice Preview</h3>
                    <button onclick="closePreview()" class="text-gray-300 hover:text-white">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                
                <div id="invoicePreview" class="bg-white overflow-auto">
                </div>

                <div class="bg-gray-50 px-6 py-4 flex justify-end space-x-3 no-print">
                    <button onclick="closePreview()" 
                        class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100 transition">
                        Close
                    </button>
                    <button onclick="downloadPDF()" 
                        class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition flex items-center">
                        <i class="fas fa-file-pdf mr-2"></i>Download PDF
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB = {
            getClients() { return JSON.parse(localStorage.getItem('mslo_clients')) || []; },
            getItems() { return JSON.parse(localStorage.getItem('mslo_items')) || []; },
            getInvoices() { return JSON.parse(localStorage.getItem('mslo_invoices')) || []; },
            getNextInvoiceNum() { return parseInt(localStorage.getItem('mslo_next_inv')) || 1; },
            saveClients(clients) { localStorage.setItem('mslo_clients', JSON.stringify(clients)); },
            saveItems(items) { localStorage.setItem('mslo_items', JSON.stringify(items)); },
            saveInvoices(invoices) { localStorage.setItem('mslo_invoices', JSON.stringify(invoices)); },
            saveNextInvoiceNum(num) { localStorage.setItem('mslo_next_inv', num); }
        };

        function formatCurrency(amount) {
            if (!amount) return 'R0.00';
            let parts = parseFloat(amount).toFixed(2).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, " ");
            return 'R' + parts[0] + '.' + parts[1];
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('invoiceDate').valueAsDate = new Date();
            document.getElementById('dueDate').valueAsDate = new Date();
            document.getElementById('invoiceNumber').value = DB.getNextInvoiceNum();
            loadClients();
            addLineItem();
        });

        function loadClients() {
            const select = document.getElementById('clientSelect');
            const clients = DB.getClients();
            select.innerHTML = '<option value="">-- Select Client --</option>';
            clients.forEach(client => {
                const option = document.createElement('option');
                option.value = client.name;
                option.textContent = client.name;
                option.dataset.address = client.address || '';
                option.dataset.email = client.email || '';
                select.appendChild(option);
            });
        }

        function addLineItem() {
            const tbody = document.getElementById('invoiceItems');
            const items = DB.getItems();
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-gray-50';
            tr.innerHTML = `
                <td class="px-4 py-3">
                    <select onchange="handleItemSelect(this)" class="w-full px-2 py-1 border border-gray-300 rounded text-sm item-select">
                        <option value="">Select item...</option>
                        ${items.map(item => `<option value="${item.name}" data-price="${item.price}">${item.name} (${formatCurrency(item.price)})</option>`).join('')}
                        <option value="custom">-- Custom Item --</option>
                    </select>
                    <input type="text" placeholder="Description" class="w-full mt-1 px-2 py-1 border border-gray-300 rounded text-sm custom-desc hidden">
                </td>
                <td class="px-4 py-3">
                    <input type="number" value="1" min="1" onchange="calculateTotals()" class="w-full px-2 py-1 border border-gray-300 rounded text-sm qty-input">
                </td>
                <td class="px-4 py-3">
                    <input type="number" step="0.01" min="0" onchange="calculateTotals()" class="w-full px-2 py-1 border border-gray-300 rounded text-sm price-input">
                </td>
                <td class="px-4 py-3 text-right font-medium text-gray-900 line-total">R0.00</td>
                <td class="px-4 py-3">
                    <button onclick="removeLineItem(this)" class="text-red-600 hover:text-red-800">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        }

        function handleItemSelect(select) {
            const row = select.closest('tr');
            const customInput = row.querySelector('.custom-desc');
            const priceInput = row.querySelector('.price-input');
            
            if (select.value === 'custom') {
                customInput.classList.remove('hidden');
                priceInput.value = '';
            } else {
                customInput.classList.add('hidden');
                const option = select.options[select.selectedIndex];
                if (option.dataset.price) {
                    priceInput.value = option.dataset.price;
                    calculateTotals();
                }
            }
        }

        function removeLineItem(btn) {
            btn.closest('tr').remove();
            calculateTotals();
        }

        function calculateTotals() {
            let total = 0;
            document.querySelectorAll('#invoiceItems tr').forEach(row => {
                const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
                const price = parseFloat(row.querySelector('.price-input').value) || 0;
                const lineTotal = qty * price;
                row.querySelector('.line-total').textContent = formatCurrency(lineTotal);
                total += lineTotal;
            });
            document.getElementById('grandTotal').textContent = formatCurrency(total);
            return total;
        }

        function getInvoiceData() {
            const items = [];
            document.querySelectorAll('#invoiceItems tr').forEach(row => {
                const select = row.querySelector('.item-select');
                const customDesc = row.querySelector('.custom-desc');
                let description = customDesc.value;
                if (!description && select.value !== 'custom' && select.value !== '') {
                    description = select.options[select.selectedIndex].text.split(' (')[0];
                }
                
                items.push({
                    description: description || 'Item',
                    quantity: parseFloat(row.querySelector('.qty-input').value) || 0,
                    price: parseFloat(row.querySelector('.price-input').value) || 0,
                    total: (parseFloat(row.querySelector('.qty-input').value) || 0) * (parseFloat(row.querySelector('.price-input').value) || 0)
                });
            });
            return items;
        }

        function previewInvoice() {
            const clientSelect = document.getElementById('clientSelect');
            const selectedOption = clientSelect.options[clientSelect.selectedIndex];
            const clientName = clientSelect.value;
            const shipTo = document.getElementById('shipTo').value;
            const invoiceNum = document.getElementById('invoiceNumber').value;
            const invoiceDate = document.getElementById('invoiceDate').value;
            const dueDate = document.getElementById('dueDate').value;
            const items = getInvoiceData();
            const total = calculateTotals();

            if (!clientName) {
                alert('Please select a client');
                return;
            }

            const clientAddress = selectedOption.dataset.address || '';
            const clientEmail = selectedOption.dataset.email || '';

            const previewHTML = `
<div class="invoice-container" style="padding:40px 50px;">

    <!-- HEADER -->
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:30px;">
        
        <!-- LEFT: LOGO -->
        <div>
            <img src="logo.png" style="height:110px; width:auto; object-fit:contain;">
        </div>

        <!-- RIGHT: INVOICE + COMPANY -->
        <div style="text-align:right;">
            <h1 style="font-size:40px; margin:0;">INVOICE</h1>

            <p style="margin-top:15px; font-weight:bold;">MSLO</p>
            <p style="margin:0;">18 swimmer road</p>
            <p style="margin:0;">23 Silvamonte village</p>
            <p style="margin:0;">Johannesburg, Gauteng 2192</p>
            <p style="margin:0;">South Africa</p>

            <p style="margin-top:10px;">0824141101</p>
            <p style="margin:0;">www.mslo.co.za</p>
        </div>
    </div>

    <!-- BILL / SHIP -->
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <div>
    <p><strong>BILL TO</strong></p>
    <p>${clientName}</p>
    <p style="white-space: pre-line;">${clientAddress}</p>
    <p>${clientEmail}</p>
</div>

        <div>
            <strong>SHIP TO</strong><br>
            ${shipTo || clientName}
        </div>

        <div style="text-align:right;">
            <p><strong>Invoice Number:</strong> ${invoiceNum}</p>
            <p><strong>Invoice Date:</strong> ${invoiceDate}</p>
            <p><strong>Payment Due:</strong> ${dueDate}</p>
            <p><strong>Amount Due (ZAR):</strong> ${formatCurrency(total)}</p>
        </div>
    </div>

    <!-- TABLE -->
    <table style="width:100%; border-collapse:collapse; margin-top:20px;">
        <thead style="background:#5b7fa6; color:white;">
            <tr>
                <th style="padding:10px; text-align:left;">Items</th>
                <th style="padding:10px;">Quantity</th>
                <th style="padding:10px; text-align:right;">Price</th>
                <th style="padding:10px; text-align:right;">Amount</th>
            </tr>
        </thead>

        <tbody>
            ${items.map(item => `
                <tr style="border-bottom:1px solid #ccc;">
                    <td style="padding:10px;">${item.description}</td>
                    <td style="padding:10px; text-align:center;">${item.quantity}</td>
                    <td style="padding:10px; text-align:right;">${formatCurrency(item.price)}</td>
                    <td style="padding:10px; text-align:right;">${formatCurrency(item.total)}</td>
                </tr>
            `).join('')}
        </tbody>
    </table>

    <!-- TOTALS -->
    <div style="margin-top:20px; text-align:right;">
        <p style="margin:5px 0;"><strong>Total:</strong> ${formatCurrency(total)}</p>

        <div style="border-top:3px solid #ccc; margin-top:10px; padding-top:10px;">
            <strong>Amount Due (ZAR): ${formatCurrency(total)}</strong>
        </div>
    </div>

    <!-- NOTES -->
    <div style="margin-top:40px;">
        <strong>Notes / Terms :</strong><br>
        Banking Details :<br>
        First National Bank<br>
        Acc no 63019145514<br>
        Branch code : 212217
    </div>

</div>
`;

            document.getElementById('invoicePreview').innerHTML = previewHTML;
            document.getElementById('previewModal').classList.remove('hidden');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.add('hidden');
        }

        function downloadPDF() {
            const element = document.getElementById('invoicePreview').firstElementChild;
            const invoiceNum = document.getElementById('invoiceNumber').value;
            
            const opt = {
                margin: 0,
                filename: `Invoice_${invoiceNum}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { 
                    scale: 4,
                    useCORS: true, 
                    logging: false,
                    letterRendering: true,
                    allowTaint: false,
                    width: 794,
                    height: 1123
                },
                jsPDF: { 
                    unit: 'px', 
                    format: [794, 1123], 
                    orientation: 'portrait',
                    compress: true,
                    hotfixes: ['px_scaling']
                },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            };
            
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Generating...';
            btn.disabled = true;
            
            html2pdf().set(opt).from(element).save().then(() => {
                console.log('PDF generated successfully');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }).catch(err => {
                console.error('Error generating PDF:', err);
                alert('Error generating PDF. Note: If you are opening the file directly (file://), try using a Local Server (like Live Server in VS Code) to fix image security errors.');
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        }

        function saveInvoice() {
            const clientName = document.getElementById('clientSelect').value;
            const invoiceDate = document.getElementById('invoiceDate').value;
            const dueDate = document.getElementById('dueDate').value;
            
            if (!clientName) {
                alert('Please select a client');
                return;
            }
            if (!invoiceDate || !dueDate) {
                alert('Please fill in all required fields');
                return;
            }

            const total = calculateTotals();
            if (total <= 0) {
                alert('Please add at least one item');
                return;
            }

            const invoice = {
                id: DB.getNextInvoiceNum(),
                invoiceNumber: document.getElementById('invoiceNumber').value,
                clientName: clientName,
                shipTo: document.getElementById('shipTo').value,
                invoiceDate: invoiceDate,
                dueDate: dueDate,
                items: getInvoiceData(),
                total: total,
                createdAt: new Date().toISOString()
            };

            const invoices = DB.getInvoices();
            invoices.push(invoice);
            DB.saveInvoices(invoices);
            DB.saveNextInvoiceNum(DB.getNextInvoiceNum() + 1);

            alert('Invoice saved successfully!');
            
            document.getElementById('invoiceNumber').value = DB.getNextInvoiceNum();
            document.getElementById('shipTo').value = '';
            document.getElementById('invoiceItems').innerHTML = '';
            addLineItem();
            calculateTotals();
        }
    </script>
