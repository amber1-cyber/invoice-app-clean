<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSLO - Manage Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <img src="logo.png" alt="MSLO Logo" class="h-10 w-auto mr-3" onerror="this.style.display='none'">
                    <h1 class="text-2xl font-bold text-gray-800">MSLO Invoice System</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                        <i class="fas fa-plus-circle mr-2"></i>Generator
                    </a>
                    <a href="history.html" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
                        <i class="fas fa-history mr-2"></i>History
                    </a>
                    <a href="manage.html" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                        <i class="fas fa-cog mr-2"></i>Manage
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Clients Section -->
            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b border-gray-200 bg-gradient-to-r from-blue-50 to-blue-100">
                    <h2 class="text-xl font-bold text-gray-800">
                        <i class="fas fa-users mr-2 text-blue-600"></i>Clients
                    </h2>
                </div>
                
                <div class="p-6">
                    <form onsubmit="addClient(event)" class="mb-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Client Name *</label>
                            <input type="text" id="clientName" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
                            <textarea id="clientAddress" rows="2"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="clientEmail"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <button type="submit"
                            class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                            <i class="fas fa-plus mr-2"></i>Add Client
                        </button>
                    </form>

                    <div class="border-t border-gray-200 pt-4">
                        <h3 class="text-sm font-semibold text-gray-700 mb-3">Saved Clients</h3>
                        <div id="clientsList" class="space-y-2 max-h-96 overflow-auto">
                            <!-- Clients will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stock/Items Section -->
            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b border-gray-200 bg-gradient-to-r from-green-50 to-green-100">
                    <h2 class="text-xl font-bold text-gray-800">
                        <i class="fas fa-box mr-2 text-green-600"></i>Stock / Items
                    </h2>
                </div>
                
                <div class="p-6">
                    <form onsubmit="addItem(event)" class="mb-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Item Name *</label>
                            <input type="text" id="itemName" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Price (ZAR) *</label>
                            <input type="number" id="itemPrice" step="0.01" min="0" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                        </div>

                        <button type="submit"
                                class="w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                                <i class="fas fa-plus mr-2"></i>Add Item
                            </button>
                    </form>

                    <div class="border-t border-gray-200 pt-4">
                        <h3 class="text-sm font-semibold text-gray-700 mb-3">Saved Items</h3>
                        <div id="itemsList" class="space-y-2 max-h-96 overflow-auto">
                            <!-- Items will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        loadClients();
        loadItems();
    });

    async function addClient(event) {
        event.preventDefault();

        const name = document.getElementById('clientName').value.trim();
        const address = document.getElementById('clientAddress').value.trim();
        const email = document.getElementById('clientEmail').value.trim();

        const { error } = await supabase
            .from('clients')
            .insert([{ name, address, email }]);

        if (error) {
            console.error(error);
            alert("❌ Error saving client");
            return;
        }

        alert("✅ Client added");

        document.getElementById('clientName').value = '';
        document.getElementById('clientAddress').value = '';
        document.getElementById('clientEmail').value = '';

        loadClients();
    }

    async function addItem(event) {
        event.preventDefault();

        const name = document.getElementById('itemName').value.trim();
        const price = parseFloat(document.getElementById('itemPrice').value);

        const { error } = await supabase
            .from('stock')
            .insert([{ name, price }]);

        if (error) {
            console.error(error);
            alert("❌ Error saving item");
            return;
        }

        alert("✅ Item added");

        document.getElementById('itemName').value = '';
        document.getElementById('itemPrice').value = '';

        loadItems();
    }

    async function loadClients() {
        const container = document.getElementById('clientsList');

        const { data: clients, error } = await supabase
            .from('clients')
            .select('*')
            .order('id', { ascending: false });

        if (error) {
            console.error(error);
            container.innerHTML = '<p class="text-red-500 text-sm italic">Error loading clients</p>';
            return;
        }

        if (!clients || clients.length === 0) {
            container.innerHTML = '<p class="text-gray-500 text-sm italic">No clients added yet</p>';
            return;
        }

        container.innerHTML = clients.map((client) => `
            <div class="flex justify-between items-start p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition">
                <div class="flex-1">
                    <p class="font-medium text-gray-900">${client.name}</p>
                    ${client.address ? `<p class="text-sm text-gray-600">${client.address}</p>` : ''}
                    ${client.email ? `<p class="text-sm text-blue-600">${client.email}</p>` : ''}
                </div>
                <button onclick="deleteClient(${client.id})"
                    class="text-red-600 hover:text-red-800 ml-2" title="Delete">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        `).join('');
    }

    async function loadItems() {
        const container = document.getElementById('itemsList');

        const { data: items, error } = await supabase
            .from('stock')
            .select('*')
            .order('id', { ascending: false });

        if (error) {
            console.error(error);
            container.innerHTML = '<p class="text-red-500 text-sm italic">Error loading items</p>';
            return;
        }

        if (!items || items.length === 0) {
            container.innerHTML = '<p class="text-gray-500 text-sm italic">No items added yet</p>';
            return;
        }

        container.innerHTML = items.map((item) => `
            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition">
                <div class="flex-1">
                    <p class="font-medium text-gray-900">${item.name}</p>
                    <p class="text-sm text-green-600 font-semibold">R${Number(item.price).toFixed(2)}</p>
                </div>
                <button onclick="deleteItem(${item.id})"
                    class="text-red-600 hover:text-red-800 ml-2" title="Delete">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        `).join('');
    }

    async function deleteClient(id) {
        if (!confirm('Are you sure you want to delete this client?')) return;

        const { error } = await supabase
            .from('clients')
            .delete()
            .eq('id', id);

        if (error) {
            console.error(error);
            alert('❌ Error deleting client');
            return;
        }

        loadClients();
    }

    async function deleteItem(id) {
        if (!confirm('Are you sure you want to delete this item?')) return;

        const { error } = await supabase
            .from('stock')
            .delete()
            .eq('id', id);

        if (error) {
            console.error(error);
            alert('❌ Error deleting item');
            return;
        }

        loadItems();
    }
</script>
